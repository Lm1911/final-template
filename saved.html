<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MoodShelf — ჩემი ბიბლიოთეკა</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="header">
    <div class="header__content">
      <a class="header__logo" href="index.html">
        MoodShelf
      </a>

      <nav class="header__nav" aria-label="მთავარი ნავიგაცია">
        <a class="header__link" href="index.html">
          მთავარი
        </a>

        <a
          class="header__link header__link--active"
          href="saved.html"
        >
          ჩემი ბიბლიოთეკა
        </a>

        <a class="header__link" href="login.html">
          პროფილი
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="saved-section">
      <div class="page-container">
        <h1 class="section-title">
          ჩემი ბიბლიოთეკა
        </h1>

        <p class="results-info" id="saved-info">
          შენახული წიგნები
        </p>

        <div
          class="books-grid"
          id="saved-books-container"
        ></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__text">
      MoodShelf — შენი პირადი წიგნების ბიბლიოთეკა
    </p>
  </footer>

  <script type="module" src="js/saved.js"></script>
</body>
</html>
